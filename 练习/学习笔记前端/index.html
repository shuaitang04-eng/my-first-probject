<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习笔记 Web 应用</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="auth-page" id="authPage">
      <div class="auth-card">
        <p class="eyebrow">Study Space</p>
        <h1 id="authTitle">登录学习空间</h1>
        <p class="muted">使用本地 Mock 账号体验登录、注册与路由守卫。</p>

        <div class="auth-tabs" role="tablist">
          <button class="tab-button active" id="loginTab" type="button">登录</button>
          <button class="tab-button" id="registerTab" type="button">注册</button>
        </div>

        <form class="auth-form" id="authForm">
          <label class="form-field" for="accountInput">
            邮箱 / 账号
            <input id="accountInput" type="text" placeholder="learner@example.com" autocomplete="username" />
          </label>

          <label class="form-field" for="passwordInput">
            密码
            <input id="passwordInput" type="password" placeholder="至少 6 位" autocomplete="current-password" />
          </label>

          <label class="form-field register-only hidden" for="confirmPasswordInput">
            确认密码
            <input id="confirmPasswordInput" type="password" placeholder="再次输入密码" autocomplete="new-password" />
          </label>

          <label class="form-field register-only hidden" for="registerNicknameInput">
            初始昵称
            <input id="registerNicknameInput" type="text" maxlength="18" placeholder="学习者" />
          </label>

          <button class="primary-button full-button" id="authSubmitButton" type="submit">登录</button>
        </form>
      </div>
    </section>

    <div class="app hidden" id="appPage">
      <aside class="sidebar">
        <button class="user-card" id="profileEntry" type="button">
          <img class="avatar" id="sidebarAvatar" alt="用户头像" />
          <span>
            <strong id="sidebarNickname">学习者</strong>
            <small id="sidebarBio">专注记录学习成长</small>
          </span>
        </button>

        <label class="search-box" for="projectSearchInput">
          <span>项目搜索</span>
          <input id="projectSearchInput" type="search" placeholder="按项目名筛选" />
        </label>

        <div class="sidebar-title">
          <span>笔记项目</span>
          <span id="projectCount">0 个</span>
        </div>
        <nav class="project-list" id="projectList" aria-label="笔记项目列表"></nav>

        <div class="sidebar-actions">
          <button class="primary-button full-button" id="addProjectButton" type="button">+ 新建项目</button>
          <button class="ghost-button full-button" id="settingsEntry" type="button">全局设置</button>
          <button class="danger-button full-button" id="logoutButton" type="button">退出登录</button>
        </div>
      </aside>

      <main class="main">
        <section class="panel note-panel" id="editorPanel">
          <div class="topbar">
            <div>
              <p class="eyebrow">Editor Area</p>
              <input class="title-input" id="projectTitleInput" type="text" />
            </div>
            <div class="save-state">
              <span id="saveStatus">已同步</span>
              <button class="ghost-button" id="deleteProjectButton" type="button">删除项目</button>
              <button class="primary-button" id="saveNoteButton" type="button">保存笔记</button>
            </div>
          </div>

          <label class="search-box content-search" for="contentSearchInput">
            <span>全文搜索</span>
            <input id="contentSearchInput" type="search" placeholder="搜索当前笔记正文" />
          </label>
          <div class="search-result" id="contentSearchResult">输入关键词后显示匹配结果。</div>

          <div class="editor-toolbar" aria-label="编辑工具栏">
            <button type="button" data-command="bold">加粗</button>
            <button type="button" data-command="heading">标题</button>
            <button type="button" data-command="list">列表</button>
            <button type="button" data-command="quote">引用</button>
          </div>

          <textarea id="noteEditor" class="note-editor" placeholder="在这里记录你的学习笔记..."></textarea>

          <section class="attachment-area" id="dropZone">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Management</p>
                <h2>附件管理栏</h2>
              </div>
              <label class="upload-button" for="attachmentInput">
                上传图片 / 文档
                <input id="attachmentInput" type="file" multiple />
              </label>
            </div>
            <p class="muted">支持点击上传或将文件拖拽到此区域，每个附件可单独移除。</p>
            <div class="attachment-grid" id="attachmentList"></div>
          </section>
        </section>

        <section class="panel hidden" id="profilePanel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Profile</p>
              <h1>个人主页</h1>
            </div>
            <button class="ghost-button" data-panel="editor" type="button">返回编辑器</button>
          </div>

          <div class="profile-form">
            <label class="avatar-picker" for="avatarInput">
              <img class="profile-avatar" id="profileAvatar" alt="个人头像预览" />
              <span>点击更换头像</span>
              <input id="avatarInput" type="file" accept="image/*" />
            </label>

            <label class="form-field" for="nicknameInput">
              昵称
              <input id="nicknameInput" type="text" maxlength="18" placeholder="请输入昵称" />
            </label>

            <label class="form-field" for="bioInput">
              个人简介
              <textarea id="bioInput" rows="4" maxlength="80" placeholder="简单介绍你的学习方向"></textarea>
            </label>

            <button class="primary-button" id="saveProfileButton" type="button">保存个人信息</button>
          </div>
        </section>

        <section class="panel hidden" id="settingsPanel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Settings</p>
              <h1>全局个性化设置</h1>
            </div>
            <button class="ghost-button" data-panel="editor" type="button">返回编辑器</button>
          </div>

          <div class="settings-grid">
            <article class="setting-card">
              <h2>深色模式</h2>
              <p class="muted">切换 dark 类名，自动改变全局背景色和文字颜色。</p>
              <button class="primary-button" id="themeToggleButton" type="button">切换主题</button>
            </article>

            <article class="setting-card">
              <h2>字号调节</h2>
              <p class="muted">选择小、中、大三档字号，偏好会保存到本地。</p>
              <div class="segmented" id="fontSizeGroup">
                <button type="button" data-size="small">小</button>
                <button type="button" data-size="medium">中</button>
                <button type="button" data-size="large">大</button>
              </div>
            </article>
          </div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
